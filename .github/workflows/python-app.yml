name: Run SampleDemo Python Script

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      
      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Or any other version like '3.12', '3.8', etc.
          
      - name: Install dependencies (if any)
        run: |
          python -m pip install --upgrade pip
          # If your script has dependencies listed in a requirements.txt file, uncomment the next line
          # pip install -r requirements.txt
          
      - name: Execute DemoPython.py script
        run: python DemoPython.py
